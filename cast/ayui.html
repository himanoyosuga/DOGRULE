<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="../images/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="../images/favicon.png">

  <link rel="stylesheet" href="https://use.typekit.net/rej4xkp.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/cast.css" />
</head>

<body>
  <nav class="site-header js-site-header" aria-label="Primary navigation">
    <button class="site-header__logo-button js-site-menu-toggle" type="button" aria-label="Open menu"
      aria-expanded="false">
      <img src="../images/logo.png" alt="DOG RULE" />
    </button>

    <div class="site-header__links">
      <a href="../index.html">Home</a>
      <a href="../index.html#introduction">Introduction.</a>
      <a href="../news/">Notice</a>
      <a href="../index.html#gallery">Gallery</a>
      <a href="../index.html#cast">Cast</a>
    </div>
  </nav>
  <main class="cast-detail-page">
    <div class="cast-detail-bg"></div>
    <div class="cast-detail-shade"></div>

    <section class="cast-detail">
      <div class="cast-detail-layout">
        <div class="cast-visual reveal">
          <div class="cast-image-frame">
            <img src="../images/cast/ayui.jpg" alt="Ayui" />
          </div>
        </div>

        <div class="cast-info">
          <p class="cast-profile-label">Cast</p>

          <div class="cast-profile-name-row">
            <h1>Ayui</h1>

            <a class="cast-x-link" href="https://x.com/ayuihaosakana" target="_blank" rel="noopener noreferrer"
              aria-label="Ayui X">
              <img src="../images/logo_x.svg" alt="X">
            </a>
          </div>

          <div class="cast-profile-slash" aria-hidden="true"></div>

          <div class="cast-quote-card">
            <p class="cast-quote-main">
              「情けない顔、とってもお似合いね。」
            </p>

            <div class="cast-quote-line"></div>

            <p>
              強さなんていらない。<br>
              取り繕う必要もない。
            </p>

            <p>
              崩れて、縋って、<br>
              それでも欲しがる姿。
            </p>

            <p>
              そういう“本当の姿”を、<br>
              ちゃんと愛でてあげますからね。
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/main.js"></script>
